definitions:
  dto.CreateInput:
    properties:
      email:
        description: Email (será validado no UseCase)
        type: string
      name:
        description: Nome da entity
        type: string
    type: object
  dto.CreateOutput:
    properties:
      created_at:
        description: Timestamp no formato RFC3339
        type: string
      id:
        description: ID gerado (ULID)
        type: string
    type: object
  dto.DeleteOutput:
    properties:
      deleted_at:
        description: Timestamp da deleção
        type: string
      id:
        type: string
    type: object
  dto.GetOutput:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  dto.ListOutput:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.GetOutput'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationOutput'
    type: object
  dto.PaginationOutput:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.UpdateInput:
    properties:
      email:
        description: Email (opcional)
        type: string
      name:
        description: Nome (opcional)
        type: string
    type: object
  dto.UpdateOutput:
    properties:
      active:
        type: boolean
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  handler.ErrorResponse:
    properties:
      code:
        type: string
      details:
        additionalProperties: {}
        type: object
      error:
        type: string
      trace_id:
        type: string
    type: object
info:
  contact: {}
paths:
  /entities:
    get:
      description: Get a paginated list of entities
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by name
        in: query
        name: name
        type: string
      - description: Filter by email
        in: query
        name: email
        type: string
      - description: Filter by active status
        in: query
        name: active
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListOutput'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: List entities
      tags:
      - entities
    post:
      consumes:
      - application/json
      description: Create a new entity with the input payload
      parameters:
      - description: Entity info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Create a new entity
      tags:
      - entities
  /entities/{id}:
    delete:
      description: Soft delete an entity by ID
      parameters:
      - description: Entity ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DeleteOutput'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Delete an entity
      tags:
      - entities
    get:
      description: Get entity details by unique ID
      parameters:
      - description: Entity ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetOutput'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get an entity by ID
      tags:
      - entities
    put:
      consumes:
      - application/json
      description: Update entity details by ID
      parameters:
      - description: Entity ID
        in: path
        name: id
        required: true
        type: string
      - description: Update info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UpdateOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Update an entity
      tags:
      - entities
swagger: "2.0"
