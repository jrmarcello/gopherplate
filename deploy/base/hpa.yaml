apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gopherplate
  labels:
    app: gopherplate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gopherplate
  minReplicas: 3
  maxReplicas: 9
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
