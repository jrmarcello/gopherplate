apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - configmap.yaml
  - secret.yaml
  - kind-redis.yaml

namespace: go-boilerplate-dev

images:
  - name: 650155821999.dkr.ecr.sa-east-1.amazonaws.com/go-boilerplate
    newName: go-boilerplate # Imagem local
    newTag: dev

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: go-boilerplate
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: go-boilerplate
  - path: hpa-patch.yaml
    target:
      kind: HorizontalPodAutoscaler
      name: go-boilerplate
