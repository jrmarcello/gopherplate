apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-boilerplate
  labels:
    app: go-boilerplate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: go-boilerplate
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
