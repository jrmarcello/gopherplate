apiVersion: v1
kind: ConfigMap
metadata:
  name: go-boilerplate-config
  labels:
    app: go-boilerplate
data:
  APP_ENV: "development"
  SERVER_PORT: "8080"
  # Database - Writer
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_USER: "user"
  DB_PASSWORD: "password"
  DB_NAME: "users"
  DB_SSLMODE: "disable"
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "10"
  DB_CONN_MAX_LIFETIME: "5m"
  DB_CONN_MAX_IDLE_TIME: "90s"
  # Database - Replica (not configured yet)
  DB_REPLICA_ENABLED: "false"
  OTEL_SERVICE_NAME: "go-boilerplate"
  OTEL_COLLECTOR_URL: "" # Desabilitado localmente
  REDIS_URL: "redis://redis-service:6379"
  REDIS_TTL: "5m"
  REDIS_ENABLED: "true"
  # Auth (fail-closed: sem keys no Secret = 503)
  SERVICE_KEYS_ENABLED: "true"
  SWAGGER_ENABLED: "true"
