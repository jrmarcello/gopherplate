apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1  # Primary node (writes)
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: user
            - name: POSTGRES_PASSWORD
              value: password
            - name: POSTGRES_DB
              value: users
            # Otimizações para alta carga
            - name: POSTGRES_INITDB_ARGS
              value: "--data-checksums"
          args:
            - "-c"
            - "max_connections=500"
            - "-c"
            - "shared_buffers=256MB"
            - "-c"
            - "work_mem=16MB"
            - "-c"
            - "maintenance_work_mem=128MB"
            - "-c"
            - "effective_cache_size=512MB"
            - "-c"
            - "random_page_cost=1.1"
            - "-c"
            - "checkpoint_completion_target=0.9"
            - "-c"
            - "wal_buffers=16MB"
            - "-c"
            - "log_statement=none"
            - "-c"
            - "log_min_duration_statement=1000"
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 1000m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user", "-d", "users"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "user", "-d", "users"]
            initialDelaySeconds: 30
            periodSeconds: 10
