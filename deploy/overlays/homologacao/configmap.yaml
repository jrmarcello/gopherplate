apiVersion: v1
kind: ConfigMap
metadata:
  name: go-boilerplate-config
  labels:
    app: go-boilerplate
data:
  APP_ENV: "homologacao"
  SERVER_PORT: "8080"
  DB_DSN: "postgres://user:password@postgres-service:5432/entities?sslmode=disable"  # Secret
  OTEL_SERVICE_NAME: "go-boilerplate"
  OTEL_COLLECTOR_URL: "http://otel-collector.sandboxappmax.internal:4317"
  REDIS_URL: "redis://redis-service:6379"
  REDIS_TTL: "5m"
  REDIS_ENABLED: "true"
