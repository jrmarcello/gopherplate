apiVersion: v1
kind: ConfigMap
metadata:
  name: gopherplate-config
  labels:
    app: gopherplate
data:
  APP_ENV: "producao"
  SERVER_PORT: "8080"
  # Database - Writer (credentials via ExternalSecret)
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "users"
  DB_SSLMODE: "require"
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "10"
  DB_CONN_MAX_LIFETIME: "5m"
  DB_CONN_MAX_IDLE_TIME: "90s"
  # Database - Replica (not configured yet)
  DB_REPLICA_ENABLED: "false"
  OTEL_SERVICE_NAME: "gopherplate"
  OTEL_COLLECTOR_URL: "http://otel-collector.appmax.internal:4317"
  REDIS_URL: "redis://redis-service:6379"
  REDIS_TTL: "5m"
  REDIS_ENABLED: "true"
  # Auth (fail-closed: se SERVICE_KEYS não estiver no Secret, retorna 503)
  SERVICE_KEYS_ENABLED: "true"
  SWAGGER_ENABLED: "false"
