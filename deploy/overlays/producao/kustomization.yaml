apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - configmap.yaml
  - secret.yaml
namespace: gopherplate-producao
images:
  - name: 409287786754.dkr.ecr.us-east-1.amazonaws.com/gopherplate
    newName: 241533123901.dkr.ecr.sa-east-1.amazonaws.com/gopherplate
    newTag: go-1
patches:
  - path: ingress-host-patch.yaml
    target:
      kind: Ingress
      name: gopherplate
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: gopherplate
  - path: hpa-patch.yaml
    target:
      kind: HorizontalPodAutoscaler
      name: gopherplate
