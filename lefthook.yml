pre-commit:
  piped: true
  commands:
    fmt:
      priority: 1
      glob: "**/*.go"
      exclude: "^docs/"
      run: goimports -w {staged_files}
      stage_fixed: true
    lint:
      priority: 2
      glob: "**/*.go"
      exclude: "^docs/"
      run: golangci-lint run --new-from-rev=HEAD

pre-push:
  commands:
    ci-local:
      # CI-parity sensor: simulates a fresh clone in a detached git worktree and runs the
      # full CI pipeline (proto, swag, build, vet, lint, test, vulncheck) there. Catches
      # gitignored-artifact drift (e.g. missing gen/proto/**) that the per-edit hooks
      # cannot see because they validate the working copy. See docs/guides/ci-parity.md.
      run: make ci-local

commit-msg:
  commands:
    conventional-commit:
      run: |
        msg=$(head -1 "{1}")
        if ! echo "$msg" | grep -qE '^(feat|fix|refactor|docs|test|chore|perf|ci|build|style)(\(.+\))?: .+'; then
          echo "Commit message must follow Conventional Commits:"
          echo "  type(scope): description"
          echo "  types: feat fix refactor docs test chore perf ci build style"
          exit 1
        fi
