name: Perf Regression

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

concurrency:
  group: perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: k6 regression gate
    runs-on: ubuntu-latest
    # Only run on main pushes or PRs explicitly labeled `perf` — performance is not on the
    # default PR critical path.
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'perf')
    timeout-minutes: 20
    env:
      LOAD_URL: http://localhost:8080
      # load scenario (~3.5 min) gives statistically stable percentiles.
      # smoke is 1 iteration — percentiles are unstable and produce false positives.
      # See docs/guides/perf-regression.md § "Why not smoke".
      SCENARIO: load
      PERF_REGRESSION_THRESHOLD: "0.35"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0

      - name: Install protoc-gen plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto stubs
        run: buf generate

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Check baseline exists
        run: |
          BASELINE="tests/load/baselines/${SCENARIO}.json"
          if [ ! -f "$BASELINE" ]; then
            echo "::warning::Baseline $BASELINE not committed yet. Run 'make load-baseline SCENARIO=${SCENARIO}' locally and commit the result."
            echo "BASELINE_MISSING=true" >> "$GITHUB_ENV"
          fi

      - name: Start infrastructure (Postgres + Redis)
        if: env.BASELINE_MISSING != 'true'
        run: make docker-up

      - name: Wait for Postgres
        if: env.BASELINE_MISSING != 'true'
        run: |
          for i in $(seq 1 60); do
            if docker exec gopherplate-db pg_isready -U user -d gopherplate >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Postgres never became ready within 60s"
          docker logs gopherplate-db | tail -40
          exit 1

      - name: Run migrations
        if: env.BASELINE_MISSING != 'true'
        run: make migrate-up

      - name: Generate Swagger (required for build)
        if: env.BASELINE_MISSING != 'true'
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          swag init -g cmd/api/main.go -o docs --parseDependency --parseInternal

      - name: Start API
        if: env.BASELINE_MISSING != 'true'
        run: |
          go build -o bin/api ./cmd/api
          ./bin/api &
          echo $! > /tmp/api.pid

      - name: Wait for API health
        if: env.BASELINE_MISSING != 'true'
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "API up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API never became healthy"
          exit 1

      - name: Run regression gate
        if: env.BASELINE_MISSING != 'true'
        run: make load-regression SCENARIO=${SCENARIO}

      - name: Stop API
        if: always() && env.BASELINE_MISSING != 'true'
        run: |
          if [ -f /tmp/api.pid ]; then
            kill "$(cat /tmp/api.pid)" || true
          fi

      - name: Upload summary artifact
        if: always() && env.BASELINE_MISSING != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-summary-${{ github.run_id }}
          path: tests/load/results/
          retention-days: 14
