name: Mutation Testing (nightly)

on:
  schedule:
    # 03:00 UTC daily — after most PRs have merged, before morning review.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  mutation:
    name: gremlins report
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest

      - name: Run mutation testing
        # Informational — nightly report, not a PR gate. Don't fail the
        # workflow on low efficacy; thresholds in .gremlins.yaml are 0.
        id: mutation
        continue-on-error: true
        run: |
          mkdir -p tests/mutation
          gremlins unleash ./internal/usecases/... 2>&1 | tee tests/mutation/report.txt

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report-${{ github.run_id }}
          path: tests/mutation/
          retention-days: 30
