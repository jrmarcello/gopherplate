name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0

      - name: Install protoc-gen plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto stubs
        run: buf generate

      - name: Generate Swagger docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          swag init -g cmd/api/main.go -o docs --parseDependency --parseInternal

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          args: --timeout=5m

  buf-breaking:
    name: Proto Breaking Changes
    runs-on: ubuntu-latest
    # Only runs when proto files change on a PR; a no-op on pushes to main
    # (main is the baseline — breaking vs. itself is always clean).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # buf breaking --against '.git#branch=<base>' needs the base ref available.
          fetch-depth: 0

      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0

      - name: buf breaking
        run: buf breaking --against ".git#branch=origin/${{ github.base_ref }},subdir=."
        working-directory: .

  semgrep:
    name: Semgrep (organizational patterns)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate semgrep rules against fixtures
        run: semgrep --test .semgrep/

      - name: Run semgrep rules
        run: semgrep --config .semgrep/ --error ./internal/

  deadcode:
    name: Dead Code Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0

      - name: Install protoc-gen plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto stubs
        run: buf generate

      - name: Generate Swagger docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          swag init -g cmd/api/main.go -o docs --parseDependency --parseInternal

      - name: Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@latest

      - name: Check for unreachable code
        run: make deadcode

  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0

      - name: Install protoc-gen plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto stubs
        run: buf generate

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck -show verbose ./...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0

      - name: Install protoc-gen plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto stubs
        run: buf generate

      - name: Run unit tests with coverage
        run: |
          mkdir -p tests/coverage
          # Exclude packages that are exercised by E2E, not unit tests:
          # handlers, routers, telemetry bootstrap, and the postgres wiring package.
          PACKAGES=$(go list ./internal/... ./pkg/... ./config/... \
            | grep -v -E '(web/handler$|web/router$|telemetry$|db/postgres$)')
          go test $PACKAGES -race -coverprofile=tests/coverage/coverage.out

      - name: Enforce 60% coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=tests/coverage/coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN { if (c+0 < 60) exit 1 }' || {
            echo "::error::coverage ${COVERAGE}% is below the 60% minimum";
            exit 1;
          }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: tests/coverage/coverage.out
          retention-days: 7

  coverage-delta:
    name: Coverage Delta (PR lines only)
    runs-on: ubuntu-latest
    # Only on PRs — needs a base to diff against.
    if: github.event_name == 'pull_request'
    needs: unit-tests
    env:
      NEW_CODE_COVERAGE_THRESHOLD: "70"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so diff-cover can resolve merge-base with main.
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
          path: tests/coverage/

      - name: Convert Go coverage to Cobertura XML
        run: |
          go install github.com/boumenot/gocover-cobertura@latest
          gocover-cobertura < tests/coverage/coverage.out > tests/coverage/coverage.xml

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install diff-cover
        run: pip install diff-cover

      - name: Run diff-cover
        run: |
          diff-cover tests/coverage/coverage.xml \
            --compare-branch origin/${{ github.base_ref }} \
            --fail-under "$NEW_CODE_COVERAGE_THRESHOLD" \
            --html-report tests/coverage/diff-cover.html \
            --markdown-report tests/coverage/diff-cover.md

      - name: Comment diff-cover report on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@331f8f5b4215f0445d3c07b4967662a32a2d3e31 # v2
        with:
          header: coverage-delta
          path: tests/coverage/diff-cover.md

      - name: Upload diff-cover HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-delta-${{ github.run_id }}
          path: tests/coverage/diff-cover.html
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # TestContainers-go spawns Postgres + Redis; ubuntu-latest has Docker built-in.
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0

      - name: Install protoc-gen plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto stubs
        run: buf generate

      - name: Run E2E tests
        run: go test ./tests/e2e/... -v -count=1 -timeout 120s

  ci-parity-selfcheck:
    name: CI-Parity Self-Check
    # Exercises TC-H-11 from .specs/ci-parity-sensor.md: runs `make ci-local` on a runner
    # with an empty $GOBIN so the auto-install path in ensure_tool actually fires.
    # If this job ever goes red, the local pre-push gate is lying to developers.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Confirm tools are absent (fresh-clone scenario)
        run: |
          for bin in buf protoc-gen-go protoc-gen-go-grpc swag goose golangci-lint govulncheck; do
            if command -v "$bin" >/dev/null 2>&1; then
              echo "::error::$bin is pre-installed; TC-H-11 can't assert the auto-install path"
              exit 1
            fi
          done
          echo "All 7 tools absent — auto-install path will be exercised."

      - name: Run make ci-local (triggers auto-install + full pipeline)
        run: make ci-local

      - name: Run the hook's own shell test harness
        run: bash .claude/hooks/ci-local_test.sh
