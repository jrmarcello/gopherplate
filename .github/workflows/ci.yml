name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate Swagger docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          swag init -g cmd/api/main.go -o docs --parseDependency --parseInternal

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.11.4
          args: --timeout=5m

  buf-breaking:
    name: Proto Breaking Changes
    runs-on: ubuntu-latest
    # Only runs when proto files change on a PR; a no-op on pushes to main
    # (main is the baseline — breaking vs. itself is always clean).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # buf breaking --against '.git#branch=<base>' needs the base ref available.
          fetch-depth: 0

      - name: Setup buf
        uses: bufbuild/buf-setup-action@65e6dafc9b6d5b68baafcb35f2df56df2e47a104 # v1

      - name: buf breaking
        run: buf breaking --against ".git#branch=origin/${{ github.base_ref }},subdir=."
        working-directory: .

  semgrep:
    name: Semgrep (organizational patterns)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate semgrep rules against fixtures
        run: semgrep --test .semgrep/

      - name: Run semgrep rules
        run: semgrep --config .semgrep/ --error ./internal/

  deadcode:
    name: Dead Code Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate Swagger docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          swag init -g cmd/api/main.go -o docs --parseDependency --parseInternal

      - name: Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@latest

      - name: Check for unreachable code
        run: make deadcode

  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck -show verbose ./...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests with coverage
        run: |
          mkdir -p tests/coverage
          # Exclude packages that are exercised by E2E, not unit tests:
          # handlers, routers, telemetry bootstrap, and the postgres wiring package.
          PACKAGES=$(go list ./internal/... ./pkg/... ./config/... \
            | grep -v -E '(web/handler$|web/router$|telemetry$|db/postgres$)')
          go test $PACKAGES -race -coverprofile=tests/coverage/coverage.out

      - name: Enforce 60% coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=tests/coverage/coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN { if (c+0 < 60) exit 1 }' || {
            echo "::error::coverage ${COVERAGE}% is below the 60% minimum";
            exit 1;
          }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: tests/coverage/coverage.out
          retention-days: 7

  coverage-delta:
    name: Coverage Delta (PR lines only)
    runs-on: ubuntu-latest
    # Only on PRs — needs a base to diff against.
    if: github.event_name == 'pull_request'
    needs: unit-tests
    env:
      NEW_CODE_COVERAGE_THRESHOLD: "70"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so diff-cover can resolve merge-base with main.
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage
          path: tests/coverage/

      - name: Convert Go coverage to Cobertura XML
        run: |
          go install github.com/boumenot/gocover-cobertura@latest
          gocover-cobertura < tests/coverage/coverage.out > tests/coverage/coverage.xml

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.x'

      - name: Install diff-cover
        run: pip install diff-cover

      - name: Run diff-cover
        run: |
          diff-cover tests/coverage/coverage.xml \
            --compare-branch origin/${{ github.base_ref }} \
            --fail-under "$NEW_CODE_COVERAGE_THRESHOLD" \
            --html-report tests/coverage/diff-cover.html \
            --markdown-report tests/coverage/diff-cover.md

      - name: Comment diff-cover report on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@331f8f5b4215f0445d3c07b4967662a32a2d3e31 # v2
        with:
          header: coverage-delta
          path: tests/coverage/diff-cover.md

      - name: Upload diff-cover HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-delta-${{ github.run_id }}
          path: tests/coverage/diff-cover.html
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # TestContainers-go spawns Postgres + Redis; ubuntu-latest has Docker built-in.
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run E2E tests
        run: go test ./tests/e2e/... -v -count=1 -timeout 120s
