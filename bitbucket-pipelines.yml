image: golang:1.25-alpine

# =============================================================================
# DEFINITIONS (reusable steps, caches, services)
# =============================================================================
# Slack notifications use $SLACK_WEBHOOK_HML / $SLACK_WEBHOOK_PRD (repo variables).
# Configure them in Bitbucket > Repository settings > Pipelines > Repository variables.

definitions:
  caches:
    go-mod: ~/.cache/go-build
    go-pkg: /go/pkg/mod
    golangci-lint: ~/.cache/golangci-lint

  services:
    docker:
      memory: 2048

  steps:
    - step: &lint
        name: Lint
        caches:
          - go-mod
          - go-pkg
          - golangci-lint
        script:
          - apk add --no-cache git gcc musl-dev
          - go mod download
          - go install github.com/swaggo/swag/cmd/swag@v1.16.6
          - go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          - swag init -g cmd/api/main.go -o docs --parseDependency --parseInternal
          - golangci-lint run ./... --concurrency 2
        after-script:
          - |
            if [ "$BITBUCKET_EXIT_CODE" -ne 0 ]; then
              apk add --no-cache curl 2>/dev/null
              curl -sf -X POST "$SLACK_WEBHOOK_HML" \
                -H 'Content-Type: application/json' \
                -d '{"text":"❌ *Check falhou no PR* — `'"$BITBUCKET_REPO_FULL_NAME"'`\n*Step:* Lint\n*Branch:* `'"$BITBUCKET_BRANCH"'` | *Build:* #'"$BITBUCKET_BUILD_NUMBER"'\n<https://bitbucket.org/'"$BITBUCKET_REPO_FULL_NAME"'/pipelines/results/'"$BITBUCKET_BUILD_NUMBER"'|Ver pipeline>"}'
            fi

    - step: &vulncheck
        name: Vulnerability Scan
        caches:
          - go-mod
          - go-pkg
        script:
          - apk add --no-cache git gcc musl-dev
          - go mod download
          - go install golang.org/x/vuln/cmd/govulncheck@latest
          - govulncheck ./...
        after-script:
          - |
            if [ "$BITBUCKET_EXIT_CODE" -ne 0 ]; then
              apk add --no-cache curl 2>/dev/null
              curl -sf -X POST "$SLACK_WEBHOOK_HML" \
                -H 'Content-Type: application/json' \
                -d '{"text":"🛡️ *Vulnerabilidade detectada* — `'"$BITBUCKET_REPO_FULL_NAME"'`\n*Branch:* `'"$BITBUCKET_BRANCH"'` | *Build:* #'"$BITBUCKET_BUILD_NUMBER"'\n⚠️ `govulncheck` encontrou vulnerabilidades conhecidas\n<https://bitbucket.org/'"$BITBUCKET_REPO_FULL_NAME"'/pipelines/results/'"$BITBUCKET_BUILD_NUMBER"'|Ver detalhes>"}'
            fi

    - step: &unit-test
        name: Unit Tests
        caches:
          - go-mod
          - go-pkg
        script:
          - apk add --no-cache git gcc musl-dev bc
          - go mod download
          - go test ./internal/... ./pkg/... ./config/... -v -race -coverprofile=coverage.out
          - |
            COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
            echo "Total coverage: ${COVERAGE}%"
            if [ $(echo "$COVERAGE < 40" | bc) -eq 1 ]; then
              echo "FAIL: coverage ${COVERAGE}% is below 40% minimum threshold"
              exit 1
            fi
        artifacts:
          - coverage.out
        after-script:
          - |
            if [ "$BITBUCKET_EXIT_CODE" -ne 0 ]; then
              apk add --no-cache curl 2>/dev/null
              curl -sf -X POST "$SLACK_WEBHOOK_HML" \
                -H 'Content-Type: application/json' \
                -d '{"text":"❌ *Check falhou no PR* — `'"$BITBUCKET_REPO_FULL_NAME"'`\n*Step:* Unit Tests\n*Branch:* `'"$BITBUCKET_BRANCH"'` | *Build:* #'"$BITBUCKET_BUILD_NUMBER"'\n<https://bitbucket.org/'"$BITBUCKET_REPO_FULL_NAME"'/pipelines/results/'"$BITBUCKET_BUILD_NUMBER"'|Ver pipeline>"}'
            fi

    - step: &e2e-test
        name: E2E Tests
        caches:
          - go-mod
          - go-pkg
        services:
          - docker
        script:
          - apk add --no-cache git gcc musl-dev
          - go mod download
          - export TESTCONTAINERS_RYUK_DISABLED=true
          - go test ./tests/e2e/... -v -count=1 -timeout 120s
        after-script:
          - |
            if [ "$BITBUCKET_EXIT_CODE" -ne 0 ]; then
              apk add --no-cache curl 2>/dev/null
              curl -sf -X POST "$SLACK_WEBHOOK_HML" \
                -H 'Content-Type: application/json' \
                -d '{"text":"❌ *Check falhou no PR* — `'"$BITBUCKET_REPO_FULL_NAME"'`\n*Step:* E2E Tests\n*Branch:* `'"$BITBUCKET_BRANCH"'` | *Build:* #'"$BITBUCKET_BUILD_NUMBER"'\n<https://bitbucket.org/'"$BITBUCKET_REPO_FULL_NAME"'/pipelines/results/'"$BITBUCKET_BUILD_NUMBER"'|Ver pipeline>"}'
            fi

