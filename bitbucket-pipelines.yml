image: golang:1.25.4-trixie

pipelines:
  branches:
    develop:
      - step:
          name: Build binary (Go)
          caches:
            - go-mod
            - go-pkg
          script:
            - apt-get update && apt-get install -y git
            - go version
            - go env GOPATH
            - cd $BITBUCKET_CLONE_DIR
            # baixa modules (cacheado)
            - go mod download
            - go run github.com/swaggo/swag/cmd/swag@latest init -g cmd/api/main.go -o docs --parseDependency --parseInternal
            # build do binário (baixo paralelismo pra evitar OOM)
            - GOMAXPROCS=1 CGO_ENABLED=1 GOOS=linux go build -p 1 -ldflags="-s -w" -o main ./cmd/api
            - ls -lh main
          artifacts:
            - main

      - step:
          name: Build and Push Docker Image (ECR)
          deployment: develop
          image: amazon/aws-cli:2.17.0
          services:
            - docker
          script:
            - export DOCKER_BUILDKIT=1
            - export AWS_DEFAULT_REGION=$AWS_REGION
            - export IMAGE_NAME=go-$ECR_REPOSITORY:$BITBUCKET_BUILD_NUMBER

            # Login no ECR
            - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

            # Prepara contexto de build com o binário já compilado
            - mkdir -p docker-context
            - ls -lh main
            - if [ ! -f main ]; then echo 'Arquivo main não encontrado!'; exit 1; fi
            - cp main config.yaml docker-context/ || true   # se config opcional, evita falha
            - mkdir -p docker-context/internal/infrastructure
            - cp -r internal/infrastructure/db docker-context/internal/infrastructure/
            - cp Dockerfile docker-context/

            # Build e push da imagem
            - docker build -t $IMAGE_NAME docker-context
            - docker tag $IMAGE_NAME $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:go-$BITBUCKET_BUILD_NUMBER
            - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:go-$BITBUCKET_BUILD_NUMBER

      - step:
          name: Atualiza tag da imagem de Homologação
          image: alpine:3.18
          script:
            - apk add --no-cache git yq
            - git config --global user.name "$BITBUCKET_USERNAME"
            - git config --global user.email "$BITBUCKET_USERNAME_EMAIL"
            # Clona o próprio repositório
            - git clone --branch develop "https://${BITBUCKET_USERNAME}:${BITBUCKET_APP_PASSWORD}@bitbucket.org/${BITBUCKET_REPO_FULL_NAME}.git" repo
            - cd repo

            # Atualiza a tag da imagem no kustomization.yaml
            - yq -i '.images[0].newTag = "go-'$BITBUCKET_BUILD_NUMBER'"' deploy/overlays/homologacao/kustomization.yaml

            # Commit e push (sem disparar o pipeline novamente)
            - git add deploy/overlays/homologacao/kustomization.yaml
            - git commit -m "Alterando tag da imagem [skip ci]"
            - git push origin develop
          
    main:
      - step:
          name: Build binary (Go)
          caches:
            - go-mod
            - go-pkg
          script:
            - apt-get update && apt-get install -y git
            - go version
            - go env GOPATH
            - cd $BITBUCKET_CLONE_DIR
            # baixa modules (cacheado)
            - go mod download
            - go run github.com/swaggo/swag/cmd/swag@latest init -g cmd/main.go -o docs
            # build do binário (baixo paralelismo pra evitar OOM)
            - GOMAXPROCS=1 CGO_ENABLED=1 GOOS=linux go build -p 1 -ldflags="-s -w" -o main ./cmd
            - ls -lh main
          artifacts:
            - main

      - step:
          name: Build and Push Docker Image (ECR)
          deployment: main
          image: amazon/aws-cli:2.17.0
          services:
            - docker
          script:
            - export DOCKER_BUILDKIT=1
            - export AWS_DEFAULT_REGION=$AWS_REGION
            - export IMAGE_NAME=go-$ECR_REPOSITORY:$BITBUCKET_BUILD_NUMBER

            # Login no ECR
            - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

            # Prepara contexto de build com o binário já compilado
            - mkdir -p docker-context
            - ls -lh main
            - if [ ! -f main ]; then echo 'Arquivo main não encontrado!'; exit 1; fi
            - cp main config.yaml docker-context/ || true   # se config opcional, evita falha
            - cp Dockerfile docker-context/

            # Build e push da imagem
            - docker build -t $IMAGE_NAME docker-context
            - docker tag $IMAGE_NAME $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:go-$BITBUCKET_BUILD_NUMBER
            - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:go-$BITBUCKET_BUILD_NUMBER
                  
      - step:
          name: Atualiza tag da imagem no overlay de produção
          image: alpine:3.18
          script:
            - apk add --no-cache git yq
            - git config --global user.name "$BITBUCKET_USERNAME"
            - git config --global user.email "$BITBUCKET_USERNAME_EMAIL"

            # Clona o próprio repositório
            - git clone --branch main "https://${BITBUCKET_USERNAME}:${BITBUCKET_APP_PASSWORD}@bitbucket.org/${BITBUCKET_REPO_FULL_NAME}.git" repo
            - cd repo

            # Atualiza a tag da imagem no kustomization.yaml
            - yq -i '.images[0].newTag = "go-'$BITBUCKET_BUILD_NUMBER'"' deploy/overlays/producao/kustomization.yaml

            # Commit e push (sem disparar o pipeline novamente)
            - git add deploy/overlays/producao/kustomization.yaml
            - git commit -m "Alterando tag da imagem [skip ci]"
            - git push origin main


definitions:
  caches:
    go-mod: ~/.cache/go-build
    go-pkg: /go/pkg/mod