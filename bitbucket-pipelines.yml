# =============================================================================
# PIPELINES
# =============================================================================
# Required repo variables:
#   - AWS_ACCOUNT_ID, AWS_REGION, ECR_REPOSITORY (AWS)
#   - SLACK_WEBHOOK_HML, SLACK_WEBHOOK_PRD (Slack incoming webhooks)
#   - BITBUCKET_APP_PASSWORD (for tag update push)
# Optional repo variables:
#   - HEALTH_CHECK_URL_HML, HEALTH_CHECK_URL_PRD (for health check steps)

pipelines:
  pull-requests:
    "**":
      - parallel:
          - step: *lint
          - step: *vulncheck
          - step: *unit-test
          - step: *e2e-test
      - step:
          name: Notify PR Success
          image: alpine:3.18
          script:
            - apk add --no-cache curl
            - |
              PR_TITLE="${BITBUCKET_PR_TITLE:-PR sem titulo}"
              PR_AUTHOR="${BITBUCKET_PR_AUTHOR_DISPLAY_NAME:-${BITBUCKET_PR_AUTHOR_UUID:-Unknown}}"
              PR_SOURCE="${BITBUCKET_BRANCH}"
              PR_DEST="${BITBUCKET_PR_DESTINATION_BRANCH:-main}"
              PR_ID="${BITBUCKET_PR_ID:-0}"
              PR_URL="https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}/pull-requests/${PR_ID}"
              curl -sf -X POST "$SLACK_WEBHOOK_HML" \
                -H 'Content-Type: application/json' \
                -d "{\"text\":\"🔀 *PR aberto* — \`${BITBUCKET_REPO_FULL_NAME}\`\n*Titulo:* ${PR_TITLE}\n*Autor:* ${PR_AUTHOR}\n*Branch:* \`${PR_SOURCE}\` → \`${PR_DEST}\`\n*Pipeline:* ✅ Todos os checks passaram\n<${PR_URL}|Ver PR>\"}"

  branches:
    develop:
      - parallel:
          - step: *lint
          - step: *vulncheck
          - step: *unit-test
          - step: *e2e-test
      - step:
          name: Build & Push Docker Image
          deployment: develop
          image: amazon/aws-cli:2.17.0
          services:
            - docker
          script:
            - export DOCKER_BUILDKIT=1
            - export AWS_DEFAULT_REGION=$AWS_REGION
            - export IMAGE_NAME=go-$ECR_REPOSITORY:$BITBUCKET_BUILD_NUMBER
            - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            - docker build --file docker/Dockerfile -t $IMAGE_NAME --build-arg VERSION=$BITBUCKET_BUILD_NUMBER --progress=plain .
            - docker tag $IMAGE_NAME $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:go-$BITBUCKET_BUILD_NUMBER
            - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:go-$BITBUCKET_BUILD_NUMBER
          after-script:
            - |
              if [ "$BITBUCKET_EXIT_CODE" -ne 0 ]; then
                apk add --no-cache curl 2>/dev/null
                curl -sf -X POST "$SLACK_WEBHOOK_HML" \
                  -H 'Content-Type: application/json' \
                  -d '{"text":"❌ *Pipeline falhou* — `'"$BITBUCKET_REPO_FULL_NAME"'` (HML)\n*Step:* Build & Push\n*Branch:* `'"$BITBUCKET_BRANCH"'` | *Build:* #'"$BITBUCKET_BUILD_NUMBER"'\n<https://bitbucket.org/'"$BITBUCKET_REPO_FULL_NAME"'/pipelines/results/'"$BITBUCKET_BUILD_NUMBER"'|Ver pipeline>"}'
              fi

      - step:
          name: Update Hom Tag
          image: alpine:3.18
          script:
            - apk add --no-cache git yq
            - git config --global user.name "$BITBUCKET_USERNAME"
            - git config --global user.email "$BITBUCKET_USERNAME_EMAIL"
            - git clone --branch develop "https://${BITBUCKET_USERNAME}:${BITBUCKET_APP_PASSWORD}@bitbucket.org/${BITBUCKET_REPO_FULL_NAME}.git" repo
            - cd repo
            - yq -i '.images[0].newTag = "go-'$BITBUCKET_BUILD_NUMBER'"' deploy/overlays/homologacao/kustomization.yaml
            - git add deploy/overlays/homologacao/kustomization.yaml
            - git commit -m "deploy(hml): update image tag to go-$BITBUCKET_BUILD_NUMBER [skip ci]"
            - git push origin develop
          after-script:
            - |
              if [ "$BITBUCKET_EXIT_CODE" -ne 0 ]; then
                apk add --no-cache curl 2>/dev/null
                curl -sf -X POST "$SLACK_WEBHOOK_HML" \
                  -H 'Content-Type: application/json' \
                  -d '{"text":"❌ *Pipeline falhou* — `'"$BITBUCKET_REPO_FULL_NAME"'` (HML)\n*Step:* Update Hom Tag\n*Branch:* `'"$BITBUCKET_BRANCH"'` | *Build:* #'"$BITBUCKET_BUILD_NUMBER"'\n<https://bitbucket.org/'"$BITBUCKET_REPO_FULL_NAME"'/pipelines/results/'"$BITBUCKET_BUILD_NUMBER"'|Ver pipeline>"}'
              fi
      # - step: *health-check-hml  # TODO: Enable after confirming VPC access
      - step:
          name: Notify Success (HML)
          image: alpine:3.18
          script:
            - apk add --no-cache curl
            - |
              AUTHOR="${BITBUCKET_STEP_TRIGGERER_DISPLAY_NAME:-${BITBUCKET_USERNAME:-Unknown}}"
              curl -sf -X POST "$SLACK_WEBHOOK_HML" \
                -H 'Content-Type: application/json' \
                -d '{"text":"✅ *Pipeline concluida com sucesso* — `'"$BITBUCKET_REPO_FULL_NAME"'` (HML)\n*Branch:* `'"$BITBUCKET_BRANCH"'` | *Build:* #'"$BITBUCKET_BUILD_NUMBER"'\n*Tag:* `go-'"$BITBUCKET_BUILD_NUMBER"'`\n*Autor:* '"$AUTHOR"'\n<https://bitbucket.org/'"$BITBUCKET_REPO_FULL_NAME"'/pipelines/results/'"$BITBUCKET_BUILD_NUMBER"'|Ver pipeline>"}'

    main:
      - parallel:
          - step: *lint
          - step: *vulncheck
          - step: *unit-test
          - step: *e2e-test
      - step:
          name: Build & Push Docker Image
          deployment: production
          image: amazon/aws-cli:2.17.0
          services:
            - docker
          script:
            - export DOCKER_BUILDKIT=1
            - export AWS_DEFAULT_REGION=$AWS_REGION
            - export IMAGE_NAME=go-$ECR_REPOSITORY:$BITBUCKET_BUILD_NUMBER
            - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            - docker build --file docker/Dockerfile -t $IMAGE_NAME --build-arg VERSION=$BITBUCKET_BUILD_NUMBER --progress=plain .
            - docker tag $IMAGE_NAME $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:go-$BITBUCKET_BUILD_NUMBER
            - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:go-$BITBUCKET_BUILD_NUMBER
          after-script:
            - |
              if [ "$BITBUCKET_EXIT_CODE" -ne 0 ]; then
                apk add --no-cache curl 2>/dev/null
                curl -sf -X POST "$SLACK_WEBHOOK_PRD" \
                  -H 'Content-Type: application/json' \
                  -d '{"text":"🚨 *Pipeline falhou* — `'"$BITBUCKET_REPO_FULL_NAME"'` (PRD)\n*Step:* Build & Push\n*Branch:* `'"$BITBUCKET_BRANCH"'` | *Build:* #'"$BITBUCKET_BUILD_NUMBER"'\n<https://bitbucket.org/'"$BITBUCKET_REPO_FULL_NAME"'/pipelines/results/'"$BITBUCKET_BUILD_NUMBER"'|Ver pipeline>"}'
              fi

      - step:
          name: Update Prd Tag
          image: alpine:3.18
          script:
            - apk add --no-cache git yq
            - git config --global user.name "$BITBUCKET_USERNAME"
            - git config --global user.email "$BITBUCKET_USERNAME_EMAIL"
            - git clone --branch main "https://${BITBUCKET_USERNAME}:${BITBUCKET_APP_PASSWORD}@bitbucket.org/${BITBUCKET_REPO_FULL_NAME}.git" repo
            - cd repo
            - yq -i '.images[0].newTag = "go-'$BITBUCKET_BUILD_NUMBER'"' deploy/overlays/producao/kustomization.yaml
            - git add deploy/overlays/producao/kustomization.yaml
            - git commit -m "deploy(prd): update image tag to go-$BITBUCKET_BUILD_NUMBER [skip ci]"
            - git push origin main
          after-script:
            - |
              if [ "$BITBUCKET_EXIT_CODE" -ne 0 ]; then
                apk add --no-cache curl 2>/dev/null
                curl -sf -X POST "$SLACK_WEBHOOK_PRD" \
                  -H 'Content-Type: application/json' \
                  -d '{"text":"🚨 *Pipeline falhou* — `'"$BITBUCKET_REPO_FULL_NAME"'` (PRD)\n*Step:* Update Prd Tag\n*Branch:* `'"$BITBUCKET_BRANCH"'` | *Build:* #'"$BITBUCKET_BUILD_NUMBER"'\n<https://bitbucket.org/'"$BITBUCKET_REPO_FULL_NAME"'/pipelines/results/'"$BITBUCKET_BUILD_NUMBER"'|Ver pipeline>"}'
              fi
      # - step: *health-check-prd  # TODO: Enable after confirming VPC access
      - step:
          name: Notify Success (PRD)
          image: alpine:3.18
          script:
            - apk add --no-cache curl
            - |
              AUTHOR="${BITBUCKET_STEP_TRIGGERER_DISPLAY_NAME:-${BITBUCKET_USERNAME:-Unknown}}"
              curl -sf -X POST "$SLACK_WEBHOOK_PRD" \
                -H 'Content-Type: application/json' \
                -d '{"text":"✅ *Pipeline concluida com sucesso* — `'"$BITBUCKET_REPO_FULL_NAME"'` (PRD)\n*Branch:* `'"$BITBUCKET_BRANCH"'` | *Build:* #'"$BITBUCKET_BUILD_NUMBER"'\n*Tag:* `go-'"$BITBUCKET_BUILD_NUMBER"'`\n*Autor:* '"$AUTHOR"'\n<https://bitbucket.org/'"$BITBUCKET_REPO_FULL_NAME"'/pipelines/results/'"$BITBUCKET_BUILD_NUMBER"'|Ver pipeline>"}'
