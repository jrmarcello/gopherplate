name: go-boilerplate

services:
  # ============================================
  # DATABASE
  # ============================================
  go-boilerplate-db:
    container_name: boilerplate-db
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-entities}
    volumes:
      - go-boilerplate-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-entities}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ============================================
  # REDIS (Cache)
  # ============================================
  go-boilerplate-redis:
    container_name: boilerplate-redis
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - go-boilerplate-redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

volumes:
  go-boilerplate-db-data:
    name: go-boilerplate-db-data
  go-boilerplate-redis-data:
    name: go-boilerplate-redis-data

networks:
  default:
    name: go-boilerplate-network
