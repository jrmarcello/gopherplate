# ELK Stack + OpenTelemetry Collector para observabilidade
# Requer: make docker-up (cria a rede go-boilerplate-network)
# Uso: docker compose -f docker/observability/docker-compose.yml up -d

name: boilerplate-observability

services:
  # ============================================
  # ELASTICSEARCH
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: boilerplate-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=boilerplate-cluster
      # Disable disk watermarks for local dev (prevents shard allocation failures on low disk)
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q status" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - go-boilerplate-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ============================================
  # KIBANA
  # ============================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: boilerplate-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=boilerplate-kibana-alerts-encrypt-32ch
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    volumes:
      - ./scripts:/usr/share/kibana/scripts:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - go-boilerplate-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ============================================
  # OPENTELEMETRY COLLECTOR
  # ============================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: boilerplate-otel-collector
    command: [ "--config=/etc/otel-config.yml" ]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-config.yml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8888:8888" # Prometheus metrics exposed by collector
      - "8889:8889" # Prometheus exporter metrics
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - go-boilerplate-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

volumes:
  elasticsearch-data:


networks:
  go-boilerplate-network:
    external: true
